version: 2
updates:

  # Root workspace (devDependencies: eslint, prettier, typescript)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Bratislava"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
      prettier:
        patterns:
          - "prettier*"

  # apps/server (fastify, drizzle, ioredis, bullmq, zod, vitest, etc.)
  - package-ecosystem: "npm"
    directory: "/apps/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Bratislava"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
    groups:
      fastify:
        patterns:
          - "fastify*"
          - "@fastify/*"
      drizzle:
        patterns:
          - "drizzle-*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"

  # packages/core (drizzle, ioredis, postgres, @ucp-js/sdk)
  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Bratislava"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"

  # packages/adapters
  - package-ecosystem: "npm"
    directory: "/packages/adapters"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Bratislava"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions (actions/checkout, actions/setup-node, actions/upload-artifact)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Bratislava"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
