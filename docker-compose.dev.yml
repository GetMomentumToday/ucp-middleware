version: '3.9'

# Development-only: backing services (Postgres + Redis).
# Run the app server locally with: npm run dev -w apps/server

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ucp
      POSTGRES_PASSWORD: ucp
      POSTGRES_DB: ucp
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ucp -d ucp']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --loglevel debug
    volumes:
      - redis_dev_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
  redis_dev_data:
